name: Generate and Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data/programs.yaml'
      - 'templates/index.html.j2'
  workflow_dispatch:
    # Allows EPMs to manually trigger a deploy from the GitHub web UI:
    # https://github.com/justinheckman-sudo/npi-dashboard/actions
    # Select "Generate and Deploy Dashboard" → Run workflow → Run workflow

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate index.html
        run: python scripts/generate.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: main
          commit-message: "chore: regenerate dashboard [skip ci]"
          single-commit: false
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
